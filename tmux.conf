#Powerline
#source /usr/share/powerline/bindings/tmux/powerline.conf
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:UTF-8"

unbind C-b
set -g prefix C-a
bind C-a send prefix
#Enable full mouse support.
set -g mouse on
#===commands from tmux2 book
#===set the base index for windows to 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display "Reloaded!"

unbind C-b
# colors for pane borders
#setw -g pane-border-style fg=green,bg=black
#setw -g pane-active-border-style fg=white,bg=yellow

#acive pane normal, other shaded out
#setw -g window-style fg=colour240,bg=colour235
#setw -g window-active-style fg=white,bg=black

# Command / message line
#set -g message-style fg=white, bold,bg=black
# ── Pane titles ────────────────────────────────────────────────────────────
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "

# ── Status line ────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style bg=colour237,fg=colour250
set -g status-left-length 30
set -g status-right-length 20

# Left: session name with powerline arrow
set -g status-left "#[fg=colour232,bg=colour148,bold] #S #[fg=colour148,bg=colour237,nobold]"

# Window list
setw -g window-status-separator ""
setw -g window-status-format " #[fg=colour244]#I #[fg=colour238]│#[fg=colour244] #W "
setw -g window-status-current-format "#[fg=colour237,bg=colour39]#[fg=colour232,bg=colour39,bold] #I  #W #[fg=colour39,bg=colour237,nobold]"

# Right: time
set -g status-right "#[fg=colour148,bg=colour237]#[fg=colour232,bg=colour148,bold] %H:%M "
##################################################
# thoughtbout Chris Toomey -setting
##################################################
bind-key - split-window -v -c '#{pane_current_path}'
bind-key \ split-window -h -c '#{pane_current_path}'

bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down resize-pane -D 1
bind -n S-UP resize-pane -U 1

bind -n C-Left resize-pane -L 10    
bind -n C-Right resize-pane -R 10
bind -n C-Down resize-pane -D 5
bind -n C-UP resize-pane -U 5

bind c new-window -c '#{pane_current_path}'
bind-key b break-pane -d 
bind-key o split-window -h "htop"
bind-key t split-window -h -c ~/ "vim todo.md"
bind-key w split-window -h -c ~/my-wiki "vim +CtrlP" 

#Chris Tomey tmux-advanced-workflow at 5 min
bind-key C-e split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# Prompted join-pane
bind-key C-i command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Easily swap a pane (targeted by pane number) with the current pane
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

bind-key C-b send-keys 'tat && exit' 'C-m'
bind-key C-k run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'









#####################################################

#smart pane switching with awareness of Vim splits. 
# See: https://github.com/christoomey/vim-tmux-navigator 
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
     | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" 
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L' 
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D' 
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U' 
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R' 
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")' 
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
     "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'" 
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
     "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"  

bind-key -T copy-mode-vi 'C-h' select-pane -L 
bind-key -T copy-mode-vi 'C-j' select-pane -D 
bind-key -T copy-mode-vi 'C-k' select-pane -U 
bind-key -T copy-mode-vi 'C-l' select-pane -R 
bind-key -T copy-mode-vi 'C-\' select-pane -l

#------Copy Mode (Vim style-----------------
# vim keys in copy and choose mode
set-window-option -g mode-keys vi
#coping selection vim style:w
#http://jasonwrya.com/blog/2011/06/07/copy-and-paste-in-tmux/
bind-key p paste-buffer     # paste; (default hotkey: ] )
bind-key P choose-buffer    # tmux clipboard history
bind-key + delete-buffer \; display-message "Deleted current Tmux Clipboard History"

# Detect WSL2 vs Linux for clipboard commands
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' {
    set -g @copy_cmd 'clip.exe'
    set -g @paste_cmd 'powershell.exe -command "Get-Clipboard"'
} {
    set -g @copy_cmd 'xsel -i -b'
    set -g @paste_cmd 'xsel -o -b'
}

# Send to tmux clipboard or system clipboard
bind-key < run-shell "tmux set-buffer -- \"$(#{@paste_cmd})\"" \; display-message "copy to tmux clipboard"
bind-key > run-shell 'tmux show-buffer | #{@copy_cmd}' \; display-message "copy to system clipboard"

# Note: for Visual block mode > hit v then C-v to trigger it
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "#{@copy_cmd}"
bind-key -T copy-mode-vi y send-keys -X copy-pipe "#{@copy_cmd}"




set -g @plugin 'tmux-plugins/tmux-resurrect'  
set -g @plugin 'tmux-plugins/tmux-continuum'  
# last saved environment is automatically restored when tmux is started.
set -g @continuum-restore 'on'


# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'









